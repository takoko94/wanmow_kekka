<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>わんも～推し犬総選挙 結果発表</title>

<style>

@font-face{
  font-family:'PandaBakery';
  src:url('pandabakery.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:1280px;
  height:720px;
  overflow:hidden;
  position:relative;
  font-family:'PandaBakery',sans-serif;
  color:white;
  background:#fff7ef;
}

/* 背景 */

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.06)
  );
  z-index:1;
}

/* キラキラ */

.sparkle{
  position:absolute;
  width:12px;
  height:12px;
  background:rgba(255,255,255,0.8);
  border-radius:50%;
  filter:blur(2px);
  animation:float 4s infinite ease-in-out;
}

.sparkle::after{
  content:"";
  position:absolute;
  inset:-5px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.45);
}

@keyframes float{
  0%{ transform:translateY(0px) scale(1);}
  50%{ transform:translateY(-12px) scale(1.2);}
  100%{ transform:translateY(0px) scale(1);}
}

/* 上 */

.top{
  position:absolute;
  top:10px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:5;
}

.main-logo{
  height:140px;
  object-fit:contain;
  filter:
  drop-shadow(0 0 15px rgba(255,255,255,0.8))
  drop-shadow(0 0 30px rgba(255,180,220,0.5));
}

.cafe-logo{
  height:100px;
  object-fit:contain;
  margin-top:12px;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.5));
}

/* ランキング */

.grid{
  position:absolute;
  top:145px;
  left:20px;
  right:20px;
  bottom:18px;

  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:16px;

  z-index:3;
}

.card{
  position:relative;
  border-radius:28px;
  overflow:hidden;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.34),
    rgba(255,255,255,0.15)
  );

  backdrop-filter:blur(10px);

  border:2px solid rgba(255,255,255,0.45);

  box-shadow:
  0 10px 25px rgba(0,0,0,0.18),
  inset 0 0 18px rgba(255,255,255,0.22);

  padding:12px;

  display:flex;
  flex-direction:column;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.25),
    transparent 40%
  );
  pointer-events:none;
}

.gold{
  background:
  linear-gradient(
    180deg,
    rgba(255,236,160,0.48),
    rgba(255,192,70,0.18)
  );

  border:2px solid rgba(255,245,190,0.9);

  box-shadow:
  0 0 20px rgba(255,220,100,0.4),
  0 10px 25px rgba(0,0,0,0.22);
}

.silver{
  background:
  linear-gradient(
    180deg,
    rgba(225,235,255,0.45),
    rgba(175,195,255,0.16)
  );

  border:2px solid rgba(240,245,255,0.9);

  box-shadow:
  0 0 18px rgba(200,220,255,0.45),
  0 10px 25px rgba(0,0,0,0.22);
}

.bronze{
  background:
  linear-gradient(
    180deg,
    rgba(255,215,180,0.42),
    rgba(210,130,80,0.16)
  );

  border:2px solid rgba(255,225,200,0.9);

  box-shadow:
  0 0 18px rgba(255,185,120,0.4),
  0 10px 25px rgba(0,0,0,0.22);
}

/* 順位 */

.rank{
  position:absolute;
  top:10px;
  left:10px;

  min-width:64px;
  height:64px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:26px;

  color:white;

  background:rgba(0,0,0,0.48);

  backdrop-filter:blur(6px);

  z-index:5;

  text-shadow:
  0 2px 6px rgba(0,0,0,0.5);
}

/* 画像 */

.photo{
  width:100%;
  height:165px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:10px;

  box-shadow:
  0 6px 16px rgba(0,0,0,0.22);
}

/* 名前 */

.name{
  font-size:27px;
  line-height:1.1;
  text-align:center;

  text-shadow:
  0 2px 8px rgba(0,0,0,0.45),
  0 0 10px rgba(255,255,255,0.2);

  margin-bottom:4px;
}

.small{
  font-size:20px;
  line-height:1.05;
}

/* 票数 */

.vote{
  text-align:center;
  font-size:34px;

  color:#fff3a8;

  text-shadow:
  0 0 15px rgba(255,225,120,0.9),
  0 2px 8px rgba(0,0,0,0.45);
}

/* 下 */

.bottom-message{
  position:absolute;
  bottom:8px;
  left:0;
  width:100%;

  text-align:center;

  font-size:34px;

  z-index:6;

  color:white;

  text-shadow:
  0 0 10px rgba(255,180,220,0.7),
  0 2px 8px rgba(0,0,0,0.35);
}

</style>
</head>

<body>

<img src="haikei.png" class="bg">
<div class="overlay"></div>

<!-- キラキラ -->
<div class="sparkle" style="top:90px;left:200px;"></div>
<div class="sparkle" style="top:180px;left:1080px;"></div>
<div class="sparkle" style="top:620px;left:120px;"></div>
<div class="sparkle" style="top:520px;left:980px;"></div>
<div class="sparkle" style="top:250px;left:620px;"></div>

<!-- 上 -->
<div class="top">
  <img src="wan_logo.png" class="main-logo">

<!-- ランキング -->
<div class="grid">

  <!-- 1 -->

  </div>

  <!-- 2 -->

    <div class="vote">2592票</div>
  </div>

  <!-- 3 -->
  <div class="card bronze">
    <div class="rank">🥉</div>
    <img src="pug.png" class="photo">
    <div class="name">パグ</div>
    <div class="vote">1524票</div>
  </div>

  <!-- 4 -->
  <div class="card">
    <div class="rank">4</div>
    <img src="poodle.png" class="photo">
    <div class="name">プードル</div>
    <div class="vote">1288票</div>
  </div>

  <!-- 5 -->
  <div class="card">
    <div class="rank">5</div>
    <img src="chihuahua.png" class="photo">
    <div class="name">チワワ</div>
    <div class="vote">866票</div>
  </div>

  <!-- 6 -->
  <div class="card">
    <div class="rank">6</div>
    <img src="dachs(1).png" class="photo">
    <div class="name">ダックスフンド</div>
    <div class="vote">796票</div>
  </div>

  <!-- 7 -->
  <div class="card">
    <div class="rank">7</div>
    <img src="schna(1).png" class="photo">
    <div class="name">シュナウザー</div>
    <div class="vote">747票</div>
  </div>

  <!-- 8 -->
  <div class="card">
    <div class="rank">8</div>
    <img src="maltipoo(1).png" class="photo">
    <div class="name small">
      マルチーズ＆トイプードル<br>
      （マルトイプー）
    </div>
    <div class="vote">305票</div>
  </div>

  <!-- 9 -->
  <div class="card">
    <div class="rank">9</div>
    <img src="shiba(1).png" class="photo">
    <div class="name">柴犬</div>
    <div class="vote">143票</div>
  </div>

  <!-- 10 -->
  <div class="card">
    <div class="rank">10</div>
    <img src="cavalier(1).png" class="photo">
    <div class="name">キャバリア</div>
    <div class="vote">101票</div>
  </div>

</div>

<div class="bottom-message">
  🐾 たくさんのご投票ありがとうございました！ 🐾
</div>

</body>
</html>
