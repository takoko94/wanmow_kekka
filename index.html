<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>わんも～推し犬総選挙 結果発表</title>

<style>

@font-face{
  font-family:'PandaBakery';
  src:url('pandabakery.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:1280px;
  height:720px;
  overflow:hidden;
  position:relative;
  font-family:'PandaBakery',sans-serif;
  background:#fff8f1;
  color:white;
}

/* 背景 */

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.03)
  );

  z-index:1;
}

/* 上 */

.top{
  position:absolute;

  top:8px;
  left:20px;
  right:20px;

  display:flex;
  justify-content:space-between;
  align-items:flex-start;

  z-index:10;
}

.main-logo{
  height:135px;
  object-fit:contain;

  filter:
  drop-shadow(0 0 14px rgba(255,255,255,0.7))
  drop-shadow(0 0 28px rgba(255,180,220,0.4));
}

.cafe-logo{
  height:95px;
  object-fit:contain;

  margin-top:10px;

  filter:
  drop-shadow(0 0 10px rgba(255,255,255,0.45));
}

/* 全体 */

.wrapper{
  position:absolute;

  top:125px;
  left:20px;
  right:20px;
  bottom:15px;

  z-index:5;

  display:flex;
  flex-direction:column;
  gap:16px;
}

/* TOP3 */

.top3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.top3 .card{
  height:250px;
}

/* 下 */

.bottom7{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:12px;
}

.bottom7 .card{
  height:310px;
}

/* カード */

.card{
  position:relative;

  border-radius:28px;

  overflow:hidden;

  padding:10px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.34),
    rgba(255,255,255,0.15)
  );

  border:2px solid rgba(255,255,255,0.42);

  backdrop-filter:blur(10px);

  box-shadow:
  0 10px 24px rgba(0,0,0,0.18),
  inset 0 0 18px rgba(255,255,255,0.2);

  display:flex;
  flex-direction:column;
}

.card::before{
  content:"";

  position:absolute;
  inset:0;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.20),
    transparent 40%
  );

  pointer-events:none;
}

/* TOP3 */

.gold{
  background:
  linear-gradient(
    180deg,
    rgba(255,235,170,0.50),
    rgba(255,200,70,0.20)
  );

  border:2px solid rgba(255,245,190,0.9);

  box-shadow:
  0 0 26px rgba(255,220,120,0.42),
  0 10px 25px rgba(0,0,0,0.22);
}

.silver{
  background:
  linear-gradient(
    180deg,
    rgba(225,235,255,0.48),
    rgba(175,195,255,0.18)
  );

  border:2px solid rgba(240,245,255,0.9);

  box-shadow:
  0 0 24px rgba(205,220,255,0.42),
  0 10px 25px rgba(0,0,0,0.22);
}

.bronze{
  background:
  linear-gradient(
    180deg,
    rgba(255,215,180,0.44),
    rgba(210,130,80,0.18)
  );

  border:2px solid rgba(255,225,200,0.9);

  box-shadow:
  0 0 24px rgba(255,185,120,0.4),
  0 10px 25px rgba(0,0,0,0.22);
}

/* 順位 */

.rank{
  position:absolute;

  top:10px;
  left:10px;

  width:58px;
  height:58px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(0,0,0,0.45);

  backdrop-filter:blur(5px);

  font-size:24px;

  z-index:5;

  text-shadow:
  0 2px 6px rgba(0,0,0,0.5);
}

/* TOP3画像 */

.top3 .photo{
  width:100%;
  height:125px;

  object-fit:cover;

  border-radius:20px;

  margin-bottom:8px;

  box-shadow:
  0 6px 16px rgba(0,0,0,0.22);
}

/* 下画像 */

.bottom7 .photo{
  width:100%;
  height:120px;

  object-fit:cover;

  border-radius:18px;

  margin-bottom:8px;

  box-shadow:
  0 5px 14px rgba(0,0,0,0.2);
}

/* TOP3名前 */

.top3 .name{
  font-size:38px;
  line-height:1.05;

  text-align:center;

  margin-bottom:4px;

  text-shadow:
  0 2px 8px rgba(0,0,0,0.45),
  0 0 12px rgba(255,255,255,0.18);
}

/* 下名前 */

.bottom7 .name{
  font-size:20px;
  line-height:1.08;

  text-align:center;

  margin-bottom:4px;

  text-shadow:
  0 2px 8px rgba(0,0,0,0.45);
}

.small{
  font-size:16px !important;
  line-height:1.05;
}

/* TOP3票 */

.top3 .vote{
  font-size:50px;

  text-align:center;

  color:#fff2a8;

  text-shadow:
  0 0 18px rgba(255,225,120,0.95),
  0 2px 8px rgba(0,0,0,0.45);
}

/* 下票 */

.bottom7 .vote{
  font-size:28px;

  text-align:center;

  color:#fff2a8;

  text-shadow:
  0 0 12px rgba(255,225,120,0.9),
  0 2px 8px rgba(0,0,0,0.45);
}

/* 下メッセージ */

.bottom-message{
  position:absolute;

  bottom:0;
  left:0;

  width:100%;

  text-align:center;

  font-size:30px;

  z-index:20;

  text-shadow:
  0 0 10px rgba(255,180,220,0.65),
  0 2px 8px rgba(0,0,0,0.35);
}

</style>
</head>

<body>

<img src="haikei.png" class="bg">
<div class="overlay"></div>

<div class="top">
  <img src="wan_logo.png" class="main-logo">
  <img src="wanmow_logo.png" class="cafe-logo">
</div>

<div class="wrapper">

  <!-- TOP3 -->
  <div class="top3">

    <div class="card gold">
      <div class="rank">🥇</div>
      <img src="pomeranian.png" class="photo">
      <div class="name">ポメラニアン</div>
      <div class="vote">4673票</div>
    </div>

    <div class="card silver">
      <div class="rank">🥈</div>
      <img src="husky.png" class="photo">
      <div class="name">ハスキー</div>
      <div class="vote">2592票</div>
    </div>

    <div class="card bronze">
      <div class="rank">🥉</div>
      <img src="pug.png" class="photo">
      <div class="name">パグ</div>
      <div class="vote">1524票</div>
    </div>

  </div>

  <!-- 4~10 -->
  <div class="bottom7">

    <div class="card">
      <div class="rank">4</div>
      <img src="poodle.png" class="photo">
      <div class="name">プードル</div>
      <div class="vote">1288票</div>
    </div>

    <div class="card">
      <div class="rank">5</div>
      <img src="chihuahua.png" class="photo">
      <div class="name">チワワ</div>
      <div class="vote">866票</div>
    </div>

    <div class="card">
      <div class="rank">6</div>
      <img src="dachs.png" class="photo">
      <div class="name">ダックスフンド</div>
      <div class="vote">796票</div>
    </div>

    <div class="card">
      <div class="rank">7</div>
      <img src="schna.png" class="photo">
      <div class="name">シュナウザー</div>
      <div class="vote">747票</div>
    </div>

    <div class="card">
      <div class="rank">8</div>
      <img src="maltipoo.png" class="photo">
      <div class="name small">
        マルチーズ＆トイプードル<br>
        （マルトイプー）
      </div>
      <div class="vote">305票</div>
    </div>

    <div class="card">
      <div class="rank">9</div>
      <img src="shiba.png" class="photo">
      <div class="name">柴犬</div>
      <div class="vote">143票</div>
    </div>

    <div class="card">
      <div class="rank">10</div>
      <img src="cavalier.png" class="photo">
      <div class="name">キャバリア</div>
      <div class="vote">101票</div>
    </div>

  </div>

</div>

<div class="bottom-message">
  🐾 たくさんのご投票ありがとうございました！ 🐾
</div>

</body>
</html>
