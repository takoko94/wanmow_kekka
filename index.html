<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, height=720" />
<title>わんも～推し犬総選挙 結果発表</title>

<style>
@font-face{
  font-family:'Panda';
  src:url('pandabakery.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:1280px;
  height:720px;
  overflow:hidden;
  font-family:'Panda',sans-serif;
  position:relative;
  color:#fff;
  background:#000;
}

.background{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.overlay{
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    rgba(255,255,255,0.10),
    rgba(255,255,255,0.05)
  );
  z-index:1;
}

.top-area{
  position:absolute;
  top:18px;
  left:30px;
  right:30px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:5;
}

.main-logo{
  height:140px;
  object-fit:contain;
  filter:
  drop-shadow(0 0 12px rgba(255,255,255,0.45))
  drop-shadow(0 0 25px rgba(255,180,220,0.45));
}

.cafe-logo{
  height:110px;
  object-fit:contain;
  opacity:0.96;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.35));
}

.rank-grid{
  position:absolute;
  top:150px;
  left:30px;
  right:30px;
  bottom:20px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:18px;
  z-index:3;
}

.card{
  position:relative;
  overflow:hidden;
  border-radius:28px;
  padding:14px;
  backdrop-filter:blur(8px);
  background:rgba(255,255,255,0.16);
  border:2px solid rgba(255,255,255,0.22);
  box-shadow:
  0 10px 30px rgba(0,0,0,0.25),
  inset 0 0 20px rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.4s;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,0.22),
    transparent 40%
  );
  pointer-events:none;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

.rank{
  position:absolute;
  top:10px;
  left:10px;
  padding:8px 14px;
  border-radius:999px;
  font-size:26px;
  background:rgba(0,0,0,0.48);
  backdrop-filter:blur(6px);
  text-shadow:0 0 8px rgba(0,0,0,0.5);
}

.name{
  font-size:28px;
  line-height:1.15;
  text-align:center;
  text-shadow:
  0 2px 10px rgba(0,0,0,0.5),
  0 0 12px rgba(255,255,255,0.25);
}

.vote{
  margin-top:6px;
  text-align:center;
  font-size:34px;
  color:#fff6b3;
  text-shadow:
  0 0 12px rgba(255,230,120,0.85),
  0 2px 8px rgba(0,0,0,0.55);
}

.gold{
  background:
  linear-gradient(
    135deg,
    rgba(255,220,120,0.42),
    rgba(255,170,0,0.18)
  );
  border:2px solid rgba(255,235,170,0.8);
}

.silver{
  background:
  linear-gradient(
    135deg,
    rgba(220,230,255,0.38),
    rgba(170,190,255,0.18)
  );
  border:2px solid rgba(230,240,255,0.8);
}

.bronze{
  background:
  linear-gradient(
    135deg,
    rgba(255,200,160,0.35),
    rgba(220,120,80,0.18)
  );
  border:2px solid rgba(255,220,190,0.8);
}

.small{
  font-size:23px;
  line-height:1.1;
}
</style>
</head>

<body>

<img src="haikei.png" class="background">
<div class="overlay"></div>

<div class="top-area">
  <img src="wan_logo.png" class="main-logo">
  <img src="wanmow_logo.png" class="cafe-logo">
</div>

<div class="rank-grid">

  <!-- 1 -->
  <div class="card gold">
    <div class="rank">🥇 1位</div>
    <img src="pomeranian.png">
    <div class="name">ポメラニアン</div>
    <div class="vote">4673票</div>
  </div>

  <!-- 2 -->
  <div class="card silver">
    <div class="rank">🥈 2位</div>
    <img src="husky.png">
    <div class="name">ハスキー</div>
    <div class="vote">2592票</div>
  </div>

  <!-- 3 -->
  <div class="card bronze">
    <div class="rank">🥉 3位</div>
    <img src="pug.png">
    <div class="name">パグ</div>
    <div class="vote">1524票</div>
  </div>

  <!-- 4 -->
  <div class="card">
    <div class="rank">4位</div>
    <img src="poodle.png">
    <div class="name">プードル</div>
    <div class="vote">1288票</div>
  </div>

  <!-- 5 -->
  <div class="card">
    <div class="rank">5位</div>
    <img src="chihuahua.png">
    <div class="name">チワワ</div>
    <div class="vote">866票</div>
  </div>

  <!-- 6 -->
  <div class="card">
    <div class="rank">6位</div>
    <img src="dachs(1).png">
    <div class="name">ダックスフンド</div>
    <div class="vote">796票</div>
  </div>

  <!-- 7 -->
  <div class="card">
    <div class="rank">7位</div>
    <img src="schna(1).png">
    <div class="name">シュナウザー</div>
    <div class="vote">747票</div>
  </div>

  <!-- 8 -->
  <div class="card">
    <div class="rank">8位</div>
    <img src="maltipoo(1).png">
    <div class="name small">マルチーズ＆トイプードル<br>（マルトイプー）</div>
    <div class="vote">305票</div>
  </div>

  <!-- 9 -->
  <div class="card">
    <div class="rank">9位</div>
    <img src="shiba(1).png">
    <div class="name">柴犬</div>
    <div class="vote">143票</div>
  </div>

  <!-- 10 -->
  <div class="card">
    <div class="rank">10位</div>
    <img src="cavalier(1).png">
    <div class="name">キャバリア</div>
    <div class="vote">101票</div>
  </div>

</div>

</body>
</html>
